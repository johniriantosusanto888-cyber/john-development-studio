<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>John Development Studio</title>
<style>
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #ffffff;
    color: #111;
  }
  .banner {
    width: 100%;
    display: block;
  }
  .profile-section {
    display: flex;
    align-items: flex-start;
    gap: 30px;
    padding: 40px;
    max-width: 1000px;
    margin: 0 auto;
    flex-wrap: wrap;
  }
  .logo-circle {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: #0d0d0d;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
  }
  .logo-circle img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
  }
  .title-block h1 {
    font-size: 42px;
    font-weight: 400;
    margin: 0 0 10px 0;
    line-height: 1.15;
  }
  .description {
    flex: 1;
    min-width: 280px;
    font-size: 18px;
    line-height: 1.5;
    color: #222;
    padding-top: 10px;
  }
</style>
</head>
<body>

  <img class="banner" src="images/jds_banner.jpg" alt="John Development Studio Banner">

  <div class="profile-section">
    <div class="logo-circle">
      <img src="images/jds_banner.jpg" alt="JDS Logo" style="object-position: -38px -610px; width: 700%; height: 700%;">
    </div>
    <div class="title-block">
      <h1>John Development Studio</h1>
    </div>
    <div class="description">
      Smart utility apps to protect, optimize, and simplify your digital life. Built for performance, designed for everyday use.
    </div>
  </div>

</body>
</html>
